name: Build bio.war

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build WAR
        run: mvn -B clean package

      - name: Remove previous bio-war artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const artifactName = 'bio-war';

            while (true) {
              const { data } = await github.rest.actions.listArtifactsForRepo({
                owner,
                repo,
                per_page: 100,
                page: 1
              });

              const matches = data.artifacts.filter((artifact) => artifact.name === artifactName);
              if (!matches.length) {
                break;
              }

              for (const artifact of matches) {
                core.info(`Deleting artifact ${artifact.id} (${artifact.name})`);
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id
                });
              }
            }

      - name: Upload bio.war
        uses: actions/upload-artifact@v4
        with:
          name: bio-war
          path: target/bio.war
          retention-days: 1
